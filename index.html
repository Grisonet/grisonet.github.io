<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GR Data — Sistema de Pesquisas Eleitorais</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#F6F5F3;color:#080808;-webkit-font-smoothing:antialiased}#root{min-height:100vh}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#E5E5E5;border-radius:3px}select:focus,input:focus{outline:2px solid #FF6428}#__errbox{position:fixed;top:0;left:0;right:0;background:#fee;color:#900;border-bottom:3px solid #c00;padding:14px 20px;font-family:Menlo,monospace;font-size:12px;z-index:99999;max-height:60vh;overflow:auto;white-space:pre-wrap;line-height:1.5}#__errbox b{font-family:'Inter',sans-serif;color:#c00;font-size:14px;display:block;margin-bottom:6px}#__errbox button{margin-top:8px;padding:4px 10px;background:#c00;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script>
  (function(){
    var box=null;
    function show(msg){
      if(!box){
        box=document.createElement('div');
        box.id='__errbox';
        box.innerHTML='<b>⚠️ Erro JavaScript detectado — copia e manda pro debug:</b>';
        var btn=document.createElement('button');
        btn.textContent='Fechar';
        btn.onclick=function(){box.remove();box=null};
        box.appendChild(btn);
        document.body.appendChild(box);
      }
      var pre=document.createElement('div');
      pre.textContent=msg;
      pre.style.marginTop='8px';
      pre.style.paddingTop='6px';
      pre.style.borderTop='1px dashed #c00';
      box.appendChild(pre);
    }
    window.addEventListener('error',function(e){
      show('[error] '+(e.message||'?')+'\nat '+(e.filename||'?')+':'+(e.lineno||'?')+':'+(e.colno||'?')+(e.error&&e.error.stack?'\n'+e.error.stack:''));
    });
    window.addEventListener('unhandledrejection',function(e){
      var r=e.reason;
      show('[promise rejection] '+(r&&r.message?r.message:r)+(r&&r.stack?'\n'+r.stack:''));
    });
    // Also expose for manual logging from React boundaries
    window.__grDataLogError=show;
  })();
</script>
<script src="app.js"></script>
</body>
</html>
